<!DOCTYPE html>
<html>
<head>
    <title>Reader's Library - Colleen Hoover</title>

    <style>
        body{
            font-family: Georgia, serif;
            background:#f4f1ea;
            margin:0;
            padding:20px;
        }

        .header{
            text-align:center;
            font-size:28px;
            font-weight:bold;
            color:#1f3b2c;
            margin-bottom:20px;
        }

        .grid{
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap:20px;
        }

        .card{
            background:#fffdf7;
            border:1px solid #e6e0d4;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 2px 6px rgba(0,0,0,0.08);
        }

        .card img{
            width:100%;
            height:375px;
            object-fit:cover;
        }

        .content{
            padding:15px;
        }

        .title{
            font-size:18px;
            font-weight:bold;
            color:#1f3b2c;
        }

        .author{
            font-size:13px;
            color:#666;
            margin-bottom:5px;
        }

        .rating{
            color:#b8860b;
            margin-bottom:10px;
        }

        textarea{
            width:100%;
            height:70px;
            padding:8px;
            border-radius:6px;
            border:1px solid #d6d0c2;
            background:#fff;
            resize:none;
        }

        button{
            width:100%;
            margin-top:10px;
            padding:10px;
            border:none;
            border-radius:6px;
            background:#1f3b2c;
            color:white;
            cursor:pointer;
        }

        button:hover{
            background:#2f5d46;
        }

        .msg{
            margin-top:8px;
            font-size:13px;
            font-weight:bold;
        }

        .error{ color:#b00020; }
        .success{ color:#1b5e20; }

    </style>
</head>

<body>

<div class="header">Reader’s Library – Colleen Hoover Collection</div>

<div class="grid">

    <div class="card">
        <img src="https://i0.wp.com/highschool.latimes.com/wp-content/uploads/2022/10/it-ends-w-us.png?fit=1200%2C800&ssl=1">
        <div class="content">
            <div class="title">It Ends With Us</div>
            <div class="author">by Colleen Hoover</div>
            <div class="rating">⭐⭐⭐⭐⭐ 4.8</div>

            <textarea id="b1" placeholder="Share your reading experience..."></textarea>
            <button id="btn1">Submit Review</button>
            <div id="m1" class="msg"></div>
        </div>
    </div>

    <div class="card">
        <img src="https://bibliojournal.com/wp-content/uploads/2022/09/verity-book-cover-img-663x1024.webp">
        <div class="content">
            <div class="title">Verity</div>
            <div class="author">by Colleen Hoover</div>
            <div class="rating">⭐⭐⭐⭐⭐ 4.7</div>

            <textarea id="b2" placeholder="Share your reading experience..."></textarea>
            <button id="btn2">Submit Review</button>
            <div id="m2" class="msg"></div>
        </div>
    </div>

    <div class="card">
        <img src="https://ir.ozone.ru/s3/multimedia-1-1/c1000/6914833597.jpg">
        <div class="content">
            <div class="title">Ugly Love</div>
            <div class="author">by Colleen Hoover</div>
            <div class="rating">⭐⭐⭐⭐ 4.5</div>

            <textarea id="b3" placeholder="Share your reading experience..."></textarea>
            <button id="btn3">Submit Review</button>
            <div id="m3" class="msg"></div>
        </div>
    </div>

    <div class="card">
        <img src="https://m.media-amazon.com/images/I/71O+AP8TOoL._SL1500_.jpg">
        <div class="content">
            <div class="title">November 9</div>
            <div class="author">by Colleen Hoover</div>
            <div class="rating">⭐⭐⭐⭐ 4.3</div>

            <textarea id="b4" placeholder="Share your reading experience..."></textarea>
            <button id="btn4">Submit Review</button>
            <div id="m4" class="msg"></div>
        </div>
    </div>

    <div class="card">
        <img src="https://images-na.ssl-images-amazon.com/images/S/compressed.photo.goodreads.com/books/1627673942i/58341222.jpg">
        <div class="content">
            <div class="title">Reminders of Him</div>
            <div class="author">by Colleen Hoover</div>
            <div class="rating">⭐⭐⭐⭐⭐ 4.6</div>

            <textarea id="b5" placeholder="Share your reading experience..."></textarea>
            <button id="btn5">Submit Review</button>
            <div id="m5" class="msg"></div>
        </div>
    </div>

</div>

<script>

document.getElementById("btn1").addEventListener("click", function () {validateReview("b1", "m1");});

document.getElementById("btn2").addEventListener("click", function () {validateReview("b2", "m2");});

document.getElementById("btn3").addEventListener("click", function () { validateReview("b3", "m3");});

document.getElementById("btn4").addEventListener("click", function () {validateReview("b4", "m4");});

document.getElementById("btn5").addEventListener("click", function () {validateReview("b5", "m5");});


function validateReview(inputId, msgId){

    const text = document.getElementById(inputId).value.trim();
    const msg = document.getElementById(msgId);

    if(text.length < 20){
        msg.textContent = "Please write at least 20 characters to share your thoughts.";
        msg.className = "msg error";
    }
    else{
        msg.textContent = "Thank you for sharing your reading review 📖";
        msg.className = "msg success";
    }
}

</script>

</body>
</html>
